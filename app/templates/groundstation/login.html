{% extends "groundstation/base_station.html" %}
{% block title %}Ground Station — Spaceship{% endblock %}

{% block content %}
<div class="login-wrap">
  <div class="login-box">
    <div class="section-label">ground station</div>
    <div class="divider divider--center"></div>

    {% if error %}
    <p class="login-error">{{ error }}</p>
    {% endif %}

    <form method="post" action="{{ url_for('groundstation.login') }}" autocomplete="off">
      <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label class="form-label" for="key">Access Key</label>
        <input class="form-input" type="password" id="key" name="key"
               placeholder="Enter key" required autofocus>
      </div>
      <button type="submit" class="station-btn" style="width:100%">Authenticate</button>
    </form>
  </div>
</div>
{% endblock %}
