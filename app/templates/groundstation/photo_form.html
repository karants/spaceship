{% extends "groundstation/base_station.html" %}
{% block title %}{{ action }} Photo — Spaceship{% endblock %}

{% block content %}
<div class="station-header">
  <h1 class="station-title">{{ action }} Photo</h1>
  <a href="{{ url_for('groundstation.command_deck') }}" class="station-btn station-btn--sm">Back to Deck</a>
</div>

<form method="post"
      action="{% if photo %}{{ url_for('groundstation.edit_photo', photo_id=photo.id) }}{% else %}{{ url_for('groundstation.add_photo') }}{% endif %}"
      enctype="multipart/form-data">
  <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">

  <div class="station-card">
    <div class="form-group">
      <label class="form-label" for="photo">Photo File</label>
      {% if photo %}
      <p style="font-size:0.7rem;color:var(--mid);margin-bottom:0.5rem;">
        Upload a new file to replace the current one.
      </p>
      {% endif %}
      <input class="form-file" type="file" id="photo" name="photo"
             accept=".jpg,.jpeg,.png,.webp,.gif"
             {% if not photo %}required{% endif %}>
    </div>

    <div class="form-group">
      <label class="form-label" for="caption">Caption</label>
      <textarea class="form-textarea" id="caption" name="caption" rows="3"
                maxlength="5000">{{ photo.caption if photo else '' }}</textarea>
    </div>

    <div class="form-group">
      <label class="form-label" for="sort_order">Sort Order</label>
      <input class="form-input" type="number" id="sort_order" name="sort_order"
             value="{{ photo.sort_order if photo else 0 }}" style="max-width: 120px;">
      <p style="font-size:0.65rem;color:var(--mid);margin-top:0.3rem;">
        Higher numbers appear first in the gallery.
      </p>
    </div>

    <button type="submit" class="station-btn">{{ action }} Photo</button>
  </div>
</form>
{% endblock %}
