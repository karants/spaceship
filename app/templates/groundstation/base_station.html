<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Ground Station — Spaceship{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/spaceship.css') }}">
</head>
<body>

<div class="stars" id="stars" aria-hidden="true"></div>

<div class="station-page">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="flash flash--{{ category }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

<script src="{{ url_for('static', filename='js/spaceship.js') }}"></script>
</body>
</html>
